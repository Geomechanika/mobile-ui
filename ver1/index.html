<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#e9eef5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Pico Station</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body>
    <main class="app-shell" aria-label="Панель станции">
      <header class="topbar">
        <button class="station-title" id="stationTitle" type="button" aria-label="Название станции">
          <span class="station-kicker">Pico 2W</span>
          <span class="station-name" id="stationName">Станция 01</span>
        </button>

        <button class="icon-button" id="settingsOpen" type="button" aria-label="Настройки">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6Zm8.1 4.9a7.8 7.8 0 0 0 0-2.2l2-1.5-2-3.5-2.4 1a8 8 0 0 0-1.9-1.1L15.5 3h-4l-.4 2.8c-.7.3-1.3.6-1.9 1.1l-2.5-1-2 3.5 2.1 1.5a8.6 8.6 0 0 0 0 2.2l-2.1 1.5 2 3.5 2.5-1c.6.5 1.2.8 1.9 1.1l.4 2.8h4l.3-2.8c.7-.3 1.4-.6 1.9-1.1l2.4 1 2-3.5-2-1.5Z"/>
          </svg>
        </button>
      </header>

      <section class="dial-panel" aria-label="Положение станции">
        <svg class="roll-dial" id="rollDial" data-read-only="true" viewBox="0 0 240 240" role="img" aria-labelledby="dialTitle dialValue">
          <title id="dialTitle">Шкала продольного вращения</title>
          <defs>
            <linearGradient id="accentStroke" x1="40" x2="200" y1="200" y2="40">
              <stop offset="0" stop-color="#f2a446"/>
              <stop offset="1" stop-color="#ff7b5f"/>
            </linearGradient>
          </defs>
          <circle class="dial-face" cx="120" cy="120" r="106"></circle>
          <g class="dial-ticks" id="dialTicks"></g>
          <circle class="dial-track" cx="120" cy="120" r="88"></circle>
          <circle class="dial-arc" id="dialArc" cx="120" cy="120" r="88"></circle>
          <g class="axis-mark" id="axisMark">
            <path d="M68 120h104"></path>
            <circle cx="120" cy="120" r="8"></circle>
          </g>
          <rect class="dial-readout-bg" x="73" y="57" width="94" height="59" rx="19"></rect>
          <circle class="dial-knob" id="dialKnob" cx="120" cy="32" r="9"></circle>
          <text class="dial-number" id="dialValue" x="120" y="92" text-anchor="middle">0°00′</text>
          <text class="dial-label" id="dialLabel" x="120" y="142" text-anchor="middle">Крен датчика</text>
        </svg>
        <div class="sensor-pill" id="sensorSource" aria-label="Источник крена" hidden>
          <span>Источник</span>
          <strong id="dialMode">IMU</strong>
        </div>
      </section>

      <section class="chart-panel" aria-label="Профиль скважины">
        <div class="panel-head chart-head">
          <div>
            <span class="panel-kicker" id="chartKicker">Профиль скважины</span>
            <strong id="chartPeak">0°</strong>
          </div>
          <div class="metric-tabs" role="tablist" aria-label="Метрика графика">
            <button class="is-active" type="button" role="tab" aria-selected="true" data-metric="height">H</button>
            <button type="button" role="tab" aria-selected="false" data-metric="angle">°</button>
            <button type="button" role="tab" aria-selected="false" data-metric="temp">T</button>
          </div>
        </div>
        <svg class="line-chart" viewBox="0 0 360 184" role="img" aria-labelledby="chartTitle chartYTitle chartXTitle">
          <title id="chartTitle">График профиля скважины</title>
          <g class="chart-grid" id="chartGrid"></g>
          <g class="chart-axis" id="chartYAxis"></g>
          <g class="chart-axis" id="chartXAxis"></g>
          <text class="axis-title y-title" id="chartYTitle" x="17" y="94" text-anchor="middle">Высота, м</text>
          <text class="axis-title" id="chartXTitle" x="206" y="174" text-anchor="middle">Дистанция, м</text>
          <path class="chart-fill" id="chartFill"></path>
          <path class="chart-line" id="chartLine"></path>
          <circle class="chart-point" id="chartPoint" r="5"></circle>
          <g class="chart-hit-points" id="chartHitPoints"></g>
          <g class="chart-tooltip" id="chartTooltip" hidden>
            <rect id="chartTooltipBox" x="0" y="0" width="94" height="44" rx="14"></rect>
            <text id="chartTooltipTitle" x="12" y="17"></text>
            <text id="chartTooltipValue" x="12" y="34"></text>
          </g>
        </svg>
      </section>

      <section class="info-grid" aria-label="Данные станции">
        <article class="info-tile">
          <span class="tile-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="m13.2 2-7.7 11h5.2l-1 9 8.8-12h-5.8L13.2 2Z"/></svg>
          </span>
          <span class="tile-label">Питание</span>
          <strong id="powerText">Вкл</strong>
        </article>

        <article class="info-tile">
          <span class="tile-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M10 4a2 2 0 1 1 4 0v8.5a5 5 0 1 1-4 0V4Zm2 11a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></svg>
          </span>
          <span class="tile-label">Температура</span>
          <strong id="tempText">24.1°C</strong>
        </article>

        <article class="info-tile">
          <span class="tile-icon signal-icon" id="signalIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 9.6a12 12 0 0 1 16 0l-2.2 2.2a8.8 8.8 0 0 0-11.6 0L4 9.6Zm4.3 4.2a5.8 5.8 0 0 1 7.4 0L12 18l-3.7-4.2Z"/></svg>
          </span>
          <span class="tile-label">Сигнал</span>
          <strong id="wifiText">-54 dBm</strong>
        </article>

        <article class="info-tile">
          <span class="tile-icon voltage-icon" id="voltageIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 3h10v4h2v12H5V7h2V3Zm2 4h6V5H9v2Zm-1 5h8v2H8v-2Zm0 4h5v2H8v-2Z"/></svg>
          </span>
          <span class="tile-label">Напряжение</span>
          <strong id="voltText">5.04 V</strong>
        </article>
      </section>

      <section class="power-panel" aria-label="Питание станции">
        <div>
          <span class="panel-kicker">Реле питания</span>
          <strong id="powerState">Включено</strong>
        </div>
        <button class="power-switch is-on" id="powerSwitch" type="button" role="switch" aria-checked="true" aria-label="Питание">
          <span></span>
        </button>
      </section>

      <section class="table-panel" aria-label="Таблица измерений">
        <div class="panel-head">
          <div>
            <span class="panel-kicker">Точки измерений</span>
            <strong id="tableStatus">Последние 5</strong>
          </div>
        </div>
        <div class="table-scroll">
          <table class="neo-table">
            <thead id="dataHead"></thead>
            <tbody id="dataRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <button class="top-button" id="scrollTop" type="button" aria-label="Наверх" hidden>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5 5.6 11.4 7 12.8l4-4V20h2V8.8l4 4 1.4-1.4L12 5Z"/>
      </svg>
    </button>

    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
    <aside class="settings-sheet" id="settingsSheet" aria-hidden="true" aria-label="Настройки">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <h2>Настройки</h2>
        <button class="icon-button small" id="settingsClose" type="button" aria-label="Закрыть">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm11.2 0L19 6.4 6.4 19 5 17.6 17.6 5Z"/>
          </svg>
        </button>
      </div>

      <label class="setting-row">
        <span>
          <strong>Темная тема</strong>
          <small>Сохраняется на устройстве iOS</small>
        </span>
        <button class="mini-switch" id="themeSwitch" type="button" role="switch" aria-checked="false">
          <span></span>
        </button>
      </label>

      <label class="setting-row text-setting">
        <span>
          <strong>Название</strong>
          <small>До 32 символов</small>
        </span>
        <input id="stationInput" type="text" maxlength="32" autocomplete="off">
      </label>

      <label class="setting-row range-setting">
        <span>
          <strong>Жирность текста</strong>
          <small id="fontWeightValue">560</small>
        </span>
        <input id="fontWeight" type="range" min="420" max="760" step="20" value="560">
      </label>

      <label class="setting-row range-setting">
        <span>
          <strong>Контраст текста</strong>
          <small id="textContrastValue">86%</small>
        </span>
        <input id="textContrast" type="range" min="68" max="100" step="1" value="86">
      </label>
    </aside>

    <script src="app.js"></script>
  </body>
</html>
